name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm (pre)
        run: npm install -g pnpm

      - name: Verify pnpm (pre)
        run: pnpm -v

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

      - name: Configure npm auth for GitHub Packages
        if: ${{ secrets.PACKAGE_PUBLISH_TOKEN != '' }}
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.PACKAGE_PUBLISH_TOKEN }}" >> ~/.npmrc
          echo "Configured npm auth from secret"

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test -- --ci --reporters=default --reporters=jest-junit

      - name: Build project
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
