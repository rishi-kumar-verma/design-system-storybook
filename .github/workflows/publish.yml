name: Publish Package

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Verify pnpm
        run: pnpm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

      - name: Configure npm auth for GitHub Packages
        if: ${{ secrets.PACKAGE_PUBLISH_TOKEN != '' }}
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.PACKAGE_PUBLISH_TOKEN }}" >> ~/.npmrc
          echo "Configured npm auth from secret"

      - name: Build package
        run: pnpm build

      - name: Publish to GitHub Packages
        env:
          PACKAGE_PUBLISH_TOKEN: ${{ secrets.PACKAGE_PUBLISH_TOKEN }}
        run: |
          pnpm --filter @freeformation/ds-components publish \
            --registry https://npm.pkg.github.com/ \
            --access public \
            --no-git-checks
