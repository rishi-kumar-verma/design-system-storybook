name: Storybook

on:
  pull_request:
    paths:
      - 'apps/storybook/**'
      - '.github/workflows/storybook.yml'

jobs:
  build-storybook:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js with pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Verify pnpm
        run: pnpm -v

      - name: Configure npm auth for GitHub Packages
        if: ${{ secrets.PACKAGE_PUBLISH_TOKEN != '' }}
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.PACKAGE_PUBLISH_TOKEN }}" >> ~/.npmrc
          echo "Configured npm auth from secret"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

      - name: Build Storybook
        run: pnpm --filter ./apps/storybook... build-storybook

      - name: Upload Storybook build (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: apps/storybook/storybook-static
